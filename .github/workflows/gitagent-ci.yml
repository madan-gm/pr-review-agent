name: GitAgent CI — Validate & PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-agent:
    name: Validate GitAgent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitAgent CLI
        run: npm install -g @shreyaskapale/gitagent

      - name: Validate agent structure
        run: gitagent validate

      - name: Validate compliance (SOD)
        run: gitagent validate --compliance

      - name: Show agent info
        run: gitagent info

  pr-review:
    name: Run PR Review Agent
    runs-on: ubuntu-latest
    needs: validate-agent

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitAgent CLI
        run: npm install -g @shreyaskapale/gitagent

      - name: Get PR diff
        id: pr-diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "Diff size:"
          wc -l pr.diff

      - name: Run GitAgent PR Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DESCRIPTION: ${{ github.event.pull_request.body }}

        run: |
          gitagent run . \
            --adapter lyzr \
            --workflow pr-review-flow \
            --input pr_diff="$(cat pr.diff)" \
            --input pr_title="$PR_TITLE" \
            --input pr_description="$PR_DESCRIPTION"