name: GitAgent CI — Validate & PR Review

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  validate-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate agent
        run: npx @open-gitagent/gitagent@latest validate

      - name: Validate compliance
        run: npx @open-gitagent/gitagent@latest validate --compliance

  pr-review:
    runs-on: ubuntu-latest
    needs: validate-agent

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Debug ENV
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LYZR_API_KEY: ${{ secrets.LYZR_API_KEY }}
        run: |
          echo "Checking environment variables..."
          if [ -z "$LYZR_API_KEY" ]; then echo "❌ LYZR_API_KEY missing"; else echo "✅ LYZR_API_KEY present"; fi
          if [ -z "$GEMINI_API_KEY" ]; then echo "❌ GEMINI_API_KEY missing"; else echo "✅ GEMINI_API_KEY present"; fi

      - name: Get PR diff
        run: |
          git fetch origin main || true
          git diff origin/main...HEAD > pr.diff || true
          echo "===== DIFF PREVIEW ====="
          head -n 50 pr.diff || true
          echo "========================"

      - name: Run GitAgent
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LYZR_API_KEY: ${{ secrets.LYZR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Running GitAgent..."

          echo "Perform a security-first pull request review on the following code changes:" > final_prompt.txt
          echo "" >> final_prompt.txt
          cat pr.diff >> final_prompt.txt
          echo "" >> final_prompt.txt
          echo "Identify:" >> final_prompt.txt
          echo "- Security vulnerabilities" >> final_prompt.txt
          echo "- Code quality issues" >> final_prompt.txt
          echo "- Best practice violations" >> final_prompt.txt
          echo "" >> final_prompt.txt
          echo "Finally, provide a clear approval decision (APPROVE / REJECT)." >> final_prompt.txt

          echo "===== PROMPT PREVIEW ====="
          head -n 40 final_prompt.txt
          echo "=========================="

          npx @open-gitagent/gitagent@latest run \
            --dir . \
            --adapter lyzr \
            -p "$(cat final_prompt.txt)"

      - name: Done
        run: echo "✅ Workflow completed"