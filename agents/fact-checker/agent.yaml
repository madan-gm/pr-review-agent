spec_version: "0.1.0"
name: fact-checker
version: 1.0.0
description: Approver sub-agent. Verifies findings and makes the final PR approval decision. Never performs code analysis itself.

model:
  preferred: gemini-2.5-flash

compliance:
  segregation_of_duties:
    roles:
      - id: approver
        permissions: [approve, reject, escalate]
    assignments:
      fact-checker: [approver]
